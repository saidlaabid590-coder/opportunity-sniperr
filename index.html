<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قناص الفرص — Opportunity Sniper</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1018;--bg2:#161822;--bg3:#1e2030;--bg4:#252840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --cyan:#22d3ee;--cyan2:rgba(34,211,238,0.12);--cyan3:rgba(34,211,238,0.2);
  --text1:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --green:#4ade80;--green2:rgba(74,222,128,0.12);
  --amber:#fbbf24;--amber2:rgba(251,191,36,0.12);
  --red:#f87171;--red2:rgba(248,113,113,0.12);
  --purple:#a78bfa;--purple2:rgba(167,139,250,0.12);
  --blue:#60a5fa;--blue2:rgba(96,165,250,0.12);
  --sidebar:220px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;overflow-x:hidden}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:rgba(15,16,24,0.98);border-left:1px solid var(--border);position:fixed;top:0;right:0;height:100vh;display:flex;flex-direction:column;z-index:100;transition:width .25s}
.sidebar.collapsed{width:64px}
.sidebar-logo{padding:14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;overflow:hidden;white-space:nowrap}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#22d3ee,#3b82f6);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.2}
.logo-text{overflow:hidden}
.logo-title{font-size:14px;font-weight:600;color:var(--text1)}
.logo-sub{font-size:10px;color:var(--cyan);font-family:monospace;margin-top:1px}
nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .15s;font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text1)}
.nav-item.active{background:var(--cyan2);color:var(--cyan);border-color:var(--cyan3)}
.nav-item svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0}
.nav-label{flex:1;overflow:hidden;text-overflow:ellipsis}
.nav-badge{background:var(--cyan2);color:var(--cyan);font-size:11px;padding:1px 7px;border-radius:20px;font-family:monospace;flex-shrink:0}
.sidebar-bottom{padding:10px 8px;border-top:1px solid var(--border)}
.api-pill{padding:7px 10px;border-radius:8px;font-size:11px;overflow:hidden;white-space:nowrap;margin-bottom:8px}
.api-pill.ok{background:var(--green2);color:var(--green);border:1px solid rgba(74,222,128,0.2)}
.api-pill.bad{background:var(--red2);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.sov-box{padding:10px;border-radius:10px;background:rgba(34,211,238,0.04);border:1px solid rgba(34,211,238,0.1);overflow:hidden;margin-bottom:8px}
.sov-title{font-size:11px;color:var(--cyan);font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap}
.sov-title svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0}
.sov-sub{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.4}
.sov-ready{font-size:10px;color:var(--green);margin-top:5px}
.collapse-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;border-radius:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;transition:all .15s}
.collapse-btn:hover{color:var(--text1);background:var(--bg3)}

/* MAIN */
.main{margin-right:var(--sidebar);flex:1;min-height:100vh;transition:margin-right .25s}
.main.collapsed{margin-right:64px}
.page{display:none;padding:22px;max-width:1100px;margin:0 auto}
.page.active{display:block}
.page-header{margin-bottom:20px}
.page-title{font-size:20px;font-weight:600;color:var(--text1)}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:var(--text1)}
.card-link{font-size:12px;color:var(--blue);cursor:pointer;background:none;border:none}
.card-link:hover{color:#93c5fd}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-icon{font-size:18px}
.stat-val{font-size:22px;font-weight:600;color:var(--text1);margin-top:7px}
.stat-label{font-size:11px;color:var(--text3);margin-top:3px}

/* QUICK ACTIONS */
.actions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.action-btn{padding:14px 16px;border-radius:12px;cursor:pointer;border:none;text-align:right;transition:filter .15s}
.action-btn:hover{filter:brightness(1.1)}
.action-btn.blue{background:linear-gradient(135deg,#1e40af,#2563eb)}
.action-btn.green{background:linear-gradient(135deg,#166534,#16a34a)}
.action-btn.purple{background:linear-gradient(135deg,#5b21b6,#7c3aed)}
.btn-icon{font-size:18px;margin-bottom:7px}
.btn-title{font-size:13px;font-weight:600;color:#fff}
.btn-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* LEADS */
.lead-item{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.lead-item:last-child{border-bottom:none}
.lead-item:hover{background:var(--bg3)}
.score-badge{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.score-high{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.25)}
.score-mid{background:rgba(251,191,36,.15);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
.score-low{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.lead-title{font-size:12px;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr}
.lead-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.sub-tag{font-size:10px;padding:2px 8px;border-radius:20px}
.status-pending{background:var(--amber2);color:var(--amber)}
.status-replied{background:var(--green2);color:var(--green)}
.status-ignored{background:rgba(100,116,139,.15);color:var(--text3)}
.status-starred{background:rgba(251,191,36,.15);color:var(--amber)}

/* BAR */
.bar-row{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px}
.bar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}

/* INPUTS */
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text1);padding:9px 13px;font-size:13px;outline:none;font-family:inherit;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(34,211,238,.1)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{resize:vertical;line-height:1.6}
select option{background:#1e2030}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#1e40af,#1d4ed8)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:linear-gradient(135deg,#991b1b,#dc2626);color:#fff}
.btn-danger:hover{background:linear-gradient(135deg,#7f1d1d,#b91c1c)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg4);color:var(--text1)}
.btn-ai{background:var(--purple2);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.btn-ai:hover{background:rgba(167,139,250,.2)}
.btn-cyan{background:var(--cyan2);color:var(--cyan);border:1px solid rgba(34,211,238,.2)}
.btn-cyan:hover{background:rgba(34,211,238,.2)}
.btn-full{width:100%}

/* SCANNER */
.mode-tabs{display:flex;gap:2px;padding:3px;border-radius:10px;background:var(--bg3);width:fit-content;margin-bottom:16px}
.mode-tab{padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border:none;background:none;transition:all .15s;font-family:inherit}
.mode-tab.active{background:#2563eb;color:#fff}
.mode-tab:hover:not(.active){color:var(--text1);background:var(--bg4)}
.sub-chip{padding:5px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:var(--bg2);transition:all .15s;user-select:none}
.sub-chip:hover{border-color:var(--border2);color:var(--text2)}
.sub-chip.on{background:var(--cyan2);color:var(--cyan);border-color:var(--cyan3)}
.subs-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.cat-label{font-size:12px;font-weight:500;margin-bottom:6px;margin-top:10px}
.log-box{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:monospace;font-size:11px;line-height:1.8;color:var(--text3);height:180px;overflow-y:auto;direction:ltr}
.log-line.ok{color:var(--green)}
.log-line.err{color:var(--red)}
.log-line.warn{color:var(--amber)}
.log-line.scan{color:var(--cyan)}
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;transition:border-color .15s}
.result-card:hover{border-color:var(--border2)}
.result-actions{display:flex;gap:7px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap}

/* AI LAB */
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.routing-log{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:monospace;font-size:11px;color:var(--text3);line-height:1.9;min-height:100px;direction:ltr}
.ai-result-box{background:var(--bg2);border:1px solid rgba(34,211,238,.2);border-radius:10px;padding:14px;margin-bottom:10px}
.ai-result-label{font-size:11px;color:var(--cyan);font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.ai-result-text{font-size:13px;color:var(--text1);line-height:1.7;direction:ltr}
.score-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.score-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;flex-shrink:0}
.model-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11px;background:var(--green2);color:var(--green);border:1px solid rgba(74,222,128,.2);margin-bottom:12px}

/* LEADS PAGE */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-tab{padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--bg2);transition:all .15s;user-select:none}
.filter-tab.active{background:var(--cyan2);color:var(--cyan);border-color:var(--cyan3)}
.search-input-wrap{position:relative;margin-bottom:12px}
.search-input-wrap svg{position:absolute;left:auto;right:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;pointer-events:none}
.search-input-wrap input{padding-right:36px}
.leads-full{border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.lead-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.lead-row:last-child{border-bottom:none}
.lead-row:hover{background:var(--bg3)}
.lead-row-actions{display:flex;gap:6px;flex-shrink:0}
.empty-state{padding:50px;text-align:center;color:var(--text3)}
.empty-state .es-icon{font-size:36px;margin-bottom:10px}
.empty-state .es-text{font-size:14px}

/* SETTINGS */
.settings-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.section-title{font-size:14px;font-weight:600;color:var(--text1);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.field-label{font-size:12px;color:var(--text2);margin-bottom:7px;display:block}
.field-hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5}
.lang-btns,.theme-btns{display:flex;gap:6px;flex-wrap:wrap}
.lang-btn,.theme-btn{padding:8px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--bg3);font-size:13px;transition:all .15s;font-family:inherit}
.lang-btn.on,.theme-btn.on{background:rgba(37,99,235,.15);color:var(--blue);border-color:rgba(37,99,235,.4)}
.input-row{display:flex;gap:8px;align-items:flex-start}
.input-row input{flex:1}
.privacy-list{list-style:none;space-y:6px}
.privacy-list li{display:flex;align-items:flex-start;gap:7px;font-size:13px;color:var(--text2);padding:4px 0}
.privacy-list li::before{content:"✓";color:var(--green);font-weight:700;flex-shrink:0}
.range-row{display:flex;align-items:center;gap:12px}
.range-row input[type=range]{flex:1;accent-color:var(--cyan)}
.range-val{font-size:16px;font-weight:600;color:var(--cyan);min-width:40px;text-align:center}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.toggle{position:relative;display:inline-block;width:44px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--bg3);border-radius:12px;transition:.3s;border:1px solid var(--border2)}
.slider:before{content:"";position:absolute;height:18px;width:18px;left:2px;bottom:2px;background:var(--text3);border-radius:50%;transition:.3s}
input:checked+.slider{background:rgba(34,211,238,.3);border-color:var(--cyan)}
input:checked+.slider:before{transform:translateX(20px);background:var(--cyan)}
.save-toast{display:none;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;background:var(--green2);color:var(--green);border:1px solid rgba(74,222,128,.2);font-size:13px;font-weight:500}
.save-toast.show{display:inline-flex}
.test-result{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px}
.test-ok{background:var(--green2);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.test-fail{background:var(--red2);color:var(--red);border:1px solid rgba(248,113,113,.2)}

/* MISC */
.warn-box{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;margin-bottom:14px}
.warn-icon{font-size:18px;flex-shrink:0}
.warn-text{font-size:13px;color:#fde68a;line-height:1.5}
.info-box{background:var(--green2);border:1px solid rgba(74,222,128,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--green);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-label{font-size:12px;color:var(--text2);margin-bottom:8px;margin-top:14px}
.custom-subs-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:rgba(37,99,235,.06);border-radius:8px;border:1px solid rgba(37,99,235,.15);margin-top:8px;min-height:36px}
.custom-sub-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;background:rgba(37,99,235,.15);color:var(--blue);border:1px solid rgba(37,99,235,.3)}
.custom-sub-tag button{background:none;border:none;color:inherit;cursor:pointer;font-size:13px;line-height:1;opacity:.7;padding:0}
.custom-sub-tag button:hover{opacity:1;color:var(--red)}
.pain-points{list-style:none;margin-top:8px}
.pain-points li{display:flex;align-items:flex-start;gap:7px;font-size:13px;color:var(--text1);padding:4px 0;direction:ltr}
.pain-points li::before{content:"▸";color:var(--cyan);flex-shrink:0}
.copy-btn-group{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.loading-dots::after{content:'.';animation:dots 1.2s infinite step-start}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

@media(max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .actions-grid{grid-template-columns:1fr}
  .two-col,.ai-grid{grid-template-columns:1fr}
  .sidebar{width:64px}
  .sidebar .logo-text,.sidebar .nav-label,.sidebar .nav-badge,.sidebar .sov-box,.sidebar .api-pill,.sidebar .collapse-btn span{display:none}
  .main{margin-right:64px}
}
</style>
</head>
<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
    </div>
    <div class="logo-text">
      <div class="logo-title">قناص الفرص</div>
      <div class="logo-sub">OPPORTUNITY SNIPER</div>
    </div>
  </div>
  <nav>
    <div class="nav-item active" onclick="nav('dashboard',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="nav-label">لوحة التحكم</span>
    </div>
    <div class="nav-item" onclick="nav('scanner',this)">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <span class="nav-label">الماسح الشبح</span>
    </div>
    <div class="nav-item" onclick="nav('leads',this)">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span class="nav-label">الصيدات</span>
      <span class="nav-badge" id="nav-count"></span>
    </div>
    <div class="nav-item" onclick="nav('ailab',this)">
      <svg viewBox="0 0 24 24"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-5 0v-15A2.5 2.5 0 0 1 9.5 2z"/><path d="M14.5 8A2.5 2.5 0 0 1 17 10.5v9a2.5 2.5 0 0 1-5 0v-9A2.5 2.5 0 0 1 14.5 8z"/></svg>
      <span class="nav-label">مختبر الذكاء</span>
    </div>
    <div class="nav-item" onclick="nav('settings',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      <span class="nav-label">الإعدادات</span>
    </div>
  </nav>
  <div class="sidebar-bottom">
    <div class="api-pill" id="api-pill">⚠️ API غير مُعيَّن</div>
